# CI: chạy test 2 phía trên mọi PR vào develop VÀ main (PR release develop→main cũng phải
# qua check — merge vào main là auto-deploy production, không được lên mà chưa test đúng SHA).
# Tên job "backend"/"frontend" được dùng làm required status check trong branch protection.
name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run backend tests (xUnit)
        run: dotnet test backend/WeatherApp.Api.Tests

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests (vitest)
        run: npx ng test --watch=false
