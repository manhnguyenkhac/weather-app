# Giữ backend Render free không ngủ: ping /api/health mỗi 10 phút.
# Render free ngủ sau 15' không có traffic — ping định kỳ giữ instance thức
# (750 instance-hours/tháng của free tier đủ cho 1 service thức 24/7).
# Lưu ý: GitHub tự tắt scheduled workflow nếu repo không có commit 60 ngày.
name: Keep-alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
            https://weather-app-api-55c4.onrender.com/api/health || echo 000)
          echo "health -> $code"
          # 200 = thức sẵn. Timeout/000/5xx thoáng qua (đang cold start) — tha lần đầu,
          # nhưng thử lại sau 30s mà vẫn lỗi THẬT (4xx/5xx) thì fail để có tín hiệu outage,
          # không im lặng che sự cố (#74)
          if [ "$code" = "200" ]; then exit 0; fi
          sleep 30
          code2=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
            https://weather-app-api-55c4.onrender.com/api/health || echo 000)
          echo "retry -> $code2"
          if [ "$code2" = "200" ] || [ "$code2" = "000" ]; then exit 0; fi
          echo "Backend tra loi that ($code2) hai lan lien tiep"
          exit 1
