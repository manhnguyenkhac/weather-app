<section class="hero">
  <div class="hero-head">
    <h2>{{ cityLabel() }}</h2>
    <span class="now">{{ i18n.t('hero.now') }}</span>
  </div>

  <div class="hero-main">
    <span class="emoji">{{ emoji() }}</span>
    <span class="temperature">{{ displayTemperature() }}°<small>{{ pref.unit() }}</small></span>
    <div class="meta">
      <p class="condition">{{ conditionText() }}</p>
      <p class="realfeel">RealFeel® {{ displayRealFeel() }}°</p>
    </div>
  </div>

  <div class="hero-details">
    <span>💨 {{ i18n.t('hero.wind') }} {{ current().windSpeed }} km/h</span>
    <span>💧 {{ i18n.t('hero.humidity') }} {{ current().humidity }}%</span>
  </div>
</section>
