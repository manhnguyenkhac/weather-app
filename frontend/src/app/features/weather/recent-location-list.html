@if (recent.locations().length > 0) {
  <section class="recent">
    <h3>{{ i18n.t('recent.title') }}</h3>
    <div class="cards">
      @for (city of recent.locations(); track city.latitude + ',' + city.longitude) {
        <app-recent-location-card [city]="city" (chosen)="choose($event)" />
      }
    </div>
  </section>
}
