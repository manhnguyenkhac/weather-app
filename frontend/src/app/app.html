<main>
  <h1>{{ title() }}</h1>

  <app-city-search />

  @if (api.selectedCity(); as city) {
    @if (api.forecast.isLoading()) {
      <p class="hint">Đang tải dự báo…</p>
    } @else if (api.forecast.error()) {
      <p class="error">Không lấy được dữ liệu thời tiết — thử lại sau.</p>
    } @else if (api.forecast.hasValue()) {
      <app-weather-card [city]="city" [current]="api.forecast.value().current" />
      <app-forecast-list [days]="api.forecast.value().daily" />
    }
  }
</main>
